services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4007:4007"
    volumes:
      - postiz-uploads:/uploads
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - postiz-net

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db
    volumes:
      - postiz-postgres:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - postiz-net

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - postiz-redis:/data
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD} ping
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - postiz-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.27
    container_name: postiz-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - postiz-elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - postiz-net

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: postiz-temporal
    restart: unless-stopped
    environment:
      - DB=elasticsearch
      - ES_SEEDS=elasticsearch
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_VERSION=v7
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: temporal operator cluster health | grep SERVING
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - postiz-net

  temporal-ui:
    image: temporalio/ui:latest
    container_name: postiz-temporal-ui
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - postiz-net

volumes:
  postiz-postgres:
  postiz-redis:
  postiz-elasticsearch:
  postiz-uploads:

networks:
  postiz-net:
    driver: bridge
